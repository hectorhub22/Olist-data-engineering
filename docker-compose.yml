# Perfiles (aceleran el arranque si no necesitas todo el stack):
#   docker compose up -d
#     → solo Postgres + Airflow (init, webserver, scheduler).
#   docker compose --profile spark --profile kafka --profile notebooks --profile bi up -d
#     → incluye Spark, Kafka, Jupyter y Metabase.
# En la primera ejecución, "docker compose build" descarga Spark en la imagen de Airflow (lento una vez).
services:
  postgres:
    image: postgres:15
    container_name: olist_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: olist
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d olist"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/olist
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      OLIST_PG_HOST: postgres
      OLIST_PG_PORT: 5432
      OLIST_PG_DB: olist
      OLIST_PG_USER: airflow
      OLIST_PG_PASSWORD: airflow
      SPARK_MASTER_URL: spark://spark-master:7077
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin"
    user: "0:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: olist_airflow_webserver
    # Evita PID obsoleto tras crash y da más margen a workers en equipos lentos / Docker Desktop.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - 'rm -f /opt/airflow/airflow-webserver.pid && exec /usr/bin/dumb-init -- /entrypoint webserver'
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/olist
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      # Default 120s: en Windows suele disparar "No response from gunicorn master" y reinicios en bucle.
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WORKERS: "2"
      OLIST_PG_HOST: postgres
      OLIST_PG_PORT: 5432
      OLIST_PG_DB: olist
      OLIST_PG_USER: airflow
      OLIST_PG_PASSWORD: airflow
      SPARK_MASTER_URL: spark://spark-master:7077
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: olist_airflow_scheduler
    command: scheduler
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/olist
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      OLIST_PG_HOST: postgres
      OLIST_PG_PORT: 5432
      OLIST_PG_DB: olist
      OLIST_PG_USER: airflow
      OLIST_PG_PASSWORD: airflow
      SPARK_MASTER_URL: spark://spark-master:7077
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  spark-master:
    profiles: [spark]
    image: bitnamilegacy/spark:3.5.1
    container_name: olist_spark_master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "7077:7077"
      - "8081:8080"
    restart: always

  spark-worker:
    profiles: [spark]
    image: bitnamilegacy/spark:3.5.1
    container_name: olist_spark_worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    depends_on:
      - spark-master
    restart: always

  jupyter:
    profiles: [notebooks]
    image: jupyter/base-notebook
    container_name: olist_jupyter
    ports:
      - "8888:8888"
    restart: always
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    profiles: [bi]
    image: metabase/metabase
    container_name: olist_metabase
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ./metabase-data:/metabase.db
    depends_on:
      postgres:
        condition: service_healthy

  zookeeper:
    profiles: [kafka]
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: olist_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: always

  kafka:
    profiles: [kafka]
    image: confluentinc/cp-kafka:7.6.1
    container_name: olist_kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    restart: always

